[build-system]
requires = ["setuptools>=61", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "commonpackages"
version = "1.0.0"
description = "Shared data models and objects for project_one"
dependencies = [
    "sqlalchemy>=2.0.0",
]
requires-python = ">=3.8"

[tool.setuptools]
packages = ["commonpackages"]
package-dir = {"commonpackages" = "src"}