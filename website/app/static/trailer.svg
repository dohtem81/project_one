<svg width="600" height="300" viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Trailer body -->
  <rect x="50" y="100" width="500" height="150" fill="#4a90e2" stroke="#333" stroke-width="2"/>
  
  <!-- Trailer frame -->
  <rect x="40" y="240" width="520" height="20" fill="#666"/>
  
  <!-- Wheels -->
  <circle cx="150" cy="270" r="25" fill="#333"/>
  <circle cx="150" cy="270" r="15" fill="#666"/>
  
  <circle cx="250" cy="270" r="25" fill="#333"/>
  <circle cx="250" cy="270" r="15" fill="#666"/>
  
  <circle cx="400" cy="270" r="25" fill="#333"/>
  <circle cx="400" cy="270" r="15" fill="#666"/>
  
  <circle cx="500" cy="270" r="25" fill="#333"/>
  <circle cx="500" cy="270" r="15" fill="#666"/>
  
  <!-- Hitch -->
  <rect x="20" y="235" width="30" height="10" fill="#666"/>
  
  <!-- Labels -->
  <text x="300" y="50" text-anchor="middle" font-family="Arial" font-size="18" fill="#333">Trailer Monitoring System</text>
  
  <!-- Sensor positions (will be overlaid by CSS) -->
  <circle cx="120" cy="140" r="8" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="480" cy="140" r="8" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="120" cy="200" r="8" fill="none" stroke="#fff" stroke-width="2"/>
  <circle cx="480" cy="200" r="8" fill="none" stroke="#fff" stroke-width="2"/>
</svg>