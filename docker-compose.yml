services:
  postgres:
    image: postgres:15
    container_name: project_one_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-project_one_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: project_one_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-admin}
    ports:
      - "5672:5672"    # AMQP port
      - "15672:15672"  # Management UI port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5      

  gateway:
    build:
      context: .
      dockerfile: ./gateway/Dockerfile
    container_name: project_one_gateway
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-project_one_db}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./gateway/app:/app/app

  swagger:
    image: swaggerapi/swagger-ui
    container_name: project_one_swagger
    ports:
      - "8080:8080"
    environment:
      - SWAGGER_JSON_URL=http://iotconsumer:8000/openapi.json
    depends_on:
      - gateway     

  pgadmin:
    image: dpage/pgadmin4
    container_name: project_one_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres           

  iotconsumer:
    build:
      context: .
      dockerfile: ./iotconsumer/Dockerfile
    container_name: project_one_iotconsumer
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-project_one_db}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-admin}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    volumes:
      - ./iotconsumer:/app
    restart: unless-stopped

  website:
    build:
      context: .
      dockerfile: ./website/Dockerfile
    container_name: project_one_website
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-project_one_db}
      WEBSOCKET_URL: ${WEBSOCKET_URL:-ws://192.168.1.29:8000/ws}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./website/app:/app/app

  postgres-mcp:
    build:
      context: ./postgres-mcp
      dockerfile: Dockerfile
    container_name: project_one_mcp
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}
      MCP_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy    

volumes:
  postgres_data:
  rabbitmq_data: